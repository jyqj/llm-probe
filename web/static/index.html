<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LLM Probe · Channel + Benchmark</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ═══════════════════ TOPBAR ═══════════════════ -->
<header class="topbar">
  <div class="brand">
    <span class="glyph">▍</span>probe
  </div>

  <nav class="app-tabs" id="appTabs">
    <button data-tab="channel"><span class="led"></span>Channel</button>
    <button data-tab="bench"><span class="led"></span>Benchmark</button>
    <button data-tab="monitor"><span class="led"></span>Monitor</button>
  </nav>

  <div class="topbar-right">
    <a href="#/settings" class="iconbtn" title="设置 · S">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </a>
  </div>
</header>

<!-- ═══════════════════ SHELL ═══════════════════ -->
<div class="shell">

  <!-- LEFT RAIL — workspace-scoped navigation, NO 'report' link -->
  <aside class="rail" id="rail">
    <!-- populated by router per current app -->
  </aside>

  <!-- MAIN — single mount, route-driven -->
  <main class="main">
    <div id="crumbBar" class="crumb-bar hidden"></div>
    <div class="main-inner" id="view"></div>
  </main>
</div>

<!-- ═══════════════════ DRAWER (run config) ═══════════════════ -->
<div class="drawer-back" id="drawerBack" onclick="closeDrawer()"></div>
<aside class="drawer" id="drawer" role="dialog" aria-hidden="true">
  <div class="drawer-head">
    <h2 id="drawerTitle">配置运行</h2>
    <div class="spacer"></div>
    <button class="iconbtn" onclick="closeDrawer()" title="关闭 · Esc">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
  <div class="drawer-foot" id="drawerFoot"></div>
</aside>

<!-- ═══════════════════ MODAL (compare / etc) ═══════════════════ -->
<div id="modalRoot"></div>

<!-- ═══════════════════ TOASTS ═══════════════════ -->
<div class="toast-stack" id="toastStack"></div>

<script src="util.js"></script>
<script src="channel.js"></script>
<script src="bench.js"></script>
<script src="history.js"></script>
<script src="monitor.js"></script>
<script src="app.js"></script>
</body>
</html>

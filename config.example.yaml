# Channel/Intelligence Test Service - Example Configuration
# Copy this file to config.yaml and set optional defaults.

server:
  listen: ":8080"

# Optional default target. API requests may also provide target_base/target_key/model.
upstream:
  base_url: "${CHANNEL_TARGET_BASE:-}"
  api_key: "${CHANNEL_TARGET_KEY:-}"
  timeout: 300

models:
  default_model: "${CHANNEL_MODEL:-claude-opus-4-6}"

log:
  level: "info"

# Optional admin token for /api/channel/*, /api/intelligence/* and /api/audit/*.
admin:
  token: "${CHANNEL_ADMIN_TOKEN:-}"

# Persistent storage.
storage:
  path: "data/detector.db"

# Channel authenticity test settings.
channel:
  sig_secret: "${CHANNEL_SIG_SECRET:-}"

# Alert configuration.
alert:
  enabled: true
  webhooks:
    - name: "feishu"
      url: "${ALERT_WEBHOOK_URL:-}"
      headers:
        Content-Type: "application/json"

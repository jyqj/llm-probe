# Detector/Benchmark Service - Example Configuration
# Copy this file to config.yaml and set optional defaults.

server:
  listen: ":8080"

# Optional default target. API requests may also provide target_base/target_key/model.
upstream:
  base_url: "${DETECT_TARGET_BASE:-}"
  api_key: "${DETECT_TARGET_KEY:-}"
  timeout: 300

models:
  default_model: "${DETECT_MODEL:-claude-opus-4-6}"

log:
  level: "info"

# Optional admin token for /api/detect/* and /api/benchmark/*.
admin:
  token: "${DETECT_ADMIN_TOKEN:-}"

# Structure/fingerprint probe settings.
probe:
  sig_secret: "${DETECT_SIG_SECRET:-}"
